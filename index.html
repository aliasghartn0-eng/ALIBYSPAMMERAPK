<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ALIBY</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#111111">

<style>

body{
    margin:0;
    background:#111;
    overflow:hidden;
    font-family:sans-serif;
}

/* جلوگیری از انتخاب متن */
*{
    -webkit-tap-highlight-color: transparent;
    user-select:none;
}

</style>

</head>

<body>

<script>

// ==========================================================
// ALIBY PANEL
// ==========================================================

(function ultimatePanel() {

    let isRunning = false;
    let spamInterval = null;
    let currentDelay = 30;
    let currentText = "ALIBY";

    // ===== گرفتن اینپوت =====
    const getInput = () => {

        return document.querySelector('[contenteditable="true"]') ||
               document.querySelector('textarea') ||
               document.querySelector('input');
    };

    // ===== ارسال =====
    const sendMessage = () => {

        const input = getInput();

        if(input){

            input.value = currentText;

            input.dispatchEvent(
                new Event('input',{bubbles:true})
            );

            console.log("ارسال:", currentText);
        }
    };

    // ===== شروع =====
    function startSpam(){

        if(isRunning) return;

        isRunning = true;

        spamInterval = setInterval(()=>{

            sendMessage();

        }, currentDelay);

        updateButton(true);
    }

    // ===== توقف =====
    function stopSpam(){

        isRunning = false;

        clearInterval(spamInterval);

        updateButton(false);
    }

    // ===== ساخت پنل =====
    const panel = document.createElement('div');

    panel.style.cssText = `
        position:fixed;
        top:100px;
        left:20px;
        width:320px;
        background:#1e1e1e;
        border-radius:18px;
        border:1px solid #444;
        z-index:999999;
        color:white;
        box-shadow:0 0 25px rgba(0,0,0,.6);
        overflow:hidden;
        backdrop-filter:blur(10px);
    `;

    // ===== هدر =====
    const header = document.createElement('div');

    header.style.cssText = `
        padding:15px;
        background:#2a2a2a;
        cursor:grab;
        user-select:none;
        font-weight:bold;
        text-align:center;
        font-size:18px;
    `;

    header.innerHTML = "⚡ ALIBY PANEL";

    // ===== محتوا =====
    const content = document.createElement('div');

    content.style.padding = "15px";

    // ===== اینپوت متن =====
    const textInput = document.createElement('input');

    textInput.value = currentText;

    textInput.placeholder = "متن";

    textInput.style.cssText = `
        width:100%;
        padding:12px;
        margin-bottom:15px;
        border:none;
        border-radius:12px;
        background:#333;
        color:white;
        box-sizing:border-box;
        outline:none;
        font-size:15px;
    `;

    textInput.oninput = (e)=>{

        currentText = e.target.value;
    };

    // ===== اسلایدر =====
    const slider = document.createElement('input');

    slider.type = "range";
    slider.min = "10";
    slider.max = "500";
    slider.value = currentDelay;

    slider.style.width = "100%";

    // ===== متن سرعت =====
    const delayText = document.createElement('div');

    delayText.style.cssText = `
        margin:12px 0;
        text-align:center;
        color:#aaa;
    `;

    delayText.innerHTML = currentDelay + "ms";

    slider.oninput = (e)=>{

        currentDelay = parseInt(e.target.value);

        delayText.innerHTML = currentDelay + "ms";

        if(isRunning){

            clearInterval(spamInterval);

            spamInterval = setInterval(()=>{

                sendMessage();

            }, currentDelay);
        }
    };

    // ===== دکمه =====
    const startBtn = document.createElement('button');

    startBtn.innerHTML = "▶️ شروع";

    startBtn.style.cssText = `
        width:100%;
        padding:14px;
        border:none;
        border-radius:14px;
        background:#4f46e5;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:.2s;
    `;

    startBtn.onclick = ()=>{

        if(isRunning){

            stopSpam();

        }else{

            startSpam();
        }
    };

    // ===== وضعیت =====
    function updateButton(running){

        if(running){

            startBtn.innerHTML = "⏹ توقف";

            startBtn.style.background = "#dc2626";

        }else{

            startBtn.innerHTML = "▶️ شروع";

            startBtn.style.background = "#4f46e5";
        }
    }

    // ===== اضافه کردن =====
    content.appendChild(textInput);
    content.appendChild(slider);
    content.appendChild(delayText);
    content.appendChild(startBtn);

    panel.appendChild(header);
    panel.appendChild(content);

    document.body.appendChild(panel);

    // ==========================================================
    // DRAG
    // ==========================================================

    let isDragging = false;

    let startX,startY,startLeft,startTop;

    header.addEventListener('mousedown',(e)=>{

        isDragging = true;

        startX = e.clientX;
        startY = e.clientY;

        startLeft = panel.offsetLeft;
        startTop = panel.offsetTop;
    });

    document.addEventListener('mousemove',(e)=>{

        if(!isDragging) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        panel.style.left = (startLeft + dx) + "px";
        panel.style.top = (startTop + dy) + "px";
    });

    document.addEventListener('mouseup',()=>{

        isDragging = false;
    });

    // ==========================================================
    // TOUCH
    // ==========================================================

    header.addEventListener('touchstart',(e)=>{

        isDragging = true;

        const touch = e.touches[0];

        startX = touch.clientX;
        startY = touch.clientY;

        startLeft = panel.offsetLeft;
        startTop = panel.offsetTop;
    });

    document.addEventListener('touchmove',(e)=>{

        if(!isDragging) return;

        const touch = e.touches[0];

        const dx = touch.clientX - startX;
        const dy = touch.clientY - startY;

        panel.style.left = (startLeft + dx) + "px";
        panel.style.top = (startTop + dy) + "px";
    });

    document.addEventListener('touchend',()=>{

        isDragging = false;
    });

})();

</script>

</body>
</html>
